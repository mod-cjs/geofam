name: CI

# Portes qualite ROADSEN.
#  - Sur Pull Request : lint + typecheck + tests unitaires + integration + build.
#    Aucun merge possible si l un est rouge (branch protection requise cote GitHub).
#  - Au merge sur main : e2e (Playwright) puis declenchement du deploiement preprod Render.
# Mapping Definition of Done : voir CADRE-INGENIERIE.md section "CI/CD & portes qualite".

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Annule les runs obsoletes sur une meme branche/PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.12.0'

jobs:
  # ---------------------------------------------------------------
  # Portes obligatoires sur PR (et sur push main pour non-regression).
  # ---------------------------------------------------------------
  quality:
    name: Lint / Typecheck / Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint (inclut le garde-fou confidentialite moteurs)
        run: pnpm lint
      - name: Test negatif du garde-fou moteurs->web (DoD 8, 1ere barriere)
        # Prouve que le garde-fou ESLint bloque REELLEMENT un import moteur depuis le front.
        # Sans ce test, une regression de config (ex. flat config ESLint 9 ignorant le
        # .eslintrc.cjs racine) rendrait le garde-fou muet sans que personne ne le voie.
        run: |
          set +e
          mkdir -p apps/web/src/__guardcheck__
          printf "import '@roadsen/engines';\nexport const x = 1;\n" > apps/web/src/__guardcheck__/forbidden.ts
          pnpm --filter @roadsen/web lint
          code=$?
          rm -rf apps/web/src/__guardcheck__
          if [ "$code" -eq 0 ]; then
            echo "::error::Le garde-fou moteurs->web NE bloque PAS l import @roadsen/engines (DoD 8 inactive)"; exit 1
          fi
          echo "OK : le garde-fou bloque bien l import moteur depuis le front"
      - name: Typecheck
        run: pnpm typecheck
      - name: Build
        run: pnpm build
      - name: Convention marqueur moteur (chaque moteur DOIT embarquer le marqueur)
        # Le controle de bundle ci-dessous grep un MARQUEUR texte stable. Il n a de
        # valeur que si TOUT moteur l embarque reellement. On force la convention :
        # tout fichier de packages/engines/src (hors marker.ts) doit contenir le
        # marqueur. Sinon un moteur sans marqueur pourrait fuiter sans declencher l alarme.
        run: |
          set +e
          src="packages/engines/src"
          [ -d "$src" ] || { echo "OK : pas encore de moteurs"; exit 0; }
          fail=0
          while IFS= read -r f; do
            case "$f" in */marker.ts|*/.gitkeep) continue;; esac
            if ! grep -Iq "ENGINE_BUNDLE_MARKER\|__ROADSEN_ENGINE_CONFIDENTIAL_DO_NOT_SHIP__" "$f"; then
              echo "::error file=$f::Moteur sans marqueur de confidentialite (importe/reference ENGINE_BUNDLE_MARKER)"; fail=1
            fi
          done < <(find "$src" -type f \( -name "*.ts" -o -name "*.tsx" \))
          [ "$fail" -eq 0 ] && echo "OK : tous les moteurs embarquent le marqueur" || exit 1
      - name: Controle de confidentialite (aucun code moteur dans le bundle CLIENT)
        # 2e barriere (la 1ere est le garde-fou ESLint ci-dessus). On grep UNIQUEMENT
        # ce qui part au navigateur (.next/static), pas .next/server (SSR legitime, et
        # qui ne ship pas au client) — sinon faux positif bloquant. On cherche le
        # specifier de package ET le MARQUEUR texte stable (un nom de symbole est
        # minifie, pas une chaine litterale). Convention : packages/engines/README.md.
        run: |
          if grep -rIl -e "@roadsen/engines" -e "__ROADSEN_ENGINE_CONFIDENTIAL_DO_NOT_SHIP__" apps/web/.next/static 2>/dev/null; then
            echo "::error::Code/marqueur moteur detecte dans le bundle navigateur (apps/web/.next/static)"; exit 1
          fi
          echo "OK : aucun symbole ni marqueur moteur dans le bundle navigateur"
      - name: Garde-fou migrations destructrices (revue obligatoire)
        # Une migration qui DROP/TRUNCATE peut detruire des donnees tenant en prod
        # (deploy auto sur main). On refuse tout DDL destructeur SAUF s il porte le
        # marqueur de revue explicite (revue ingenieur-securite documentee dans la PR) :
        #   -- ROADSEN-MIGRATION-REVIEWED: <raison + qui a valide>
        run: |
          set +e
          mig_dir="apps/api/prisma/migrations"
          [ -d "$mig_dir" ] || { echo "OK : pas de migrations"; exit 0; }
          fail=0
          while IFS= read -r f; do
            if grep -IniE "drop +(table|column|schema|constraint|index|type|sequence|view)|truncate|delete +from|alter +table .* drop" "$f" >/dev/null 2>&1; then
              if ! grep -Iq "ROADSEN-MIGRATION-REVIEWED:" "$f"; then
                echo "::error file=$f::DDL destructeur sans marqueur de revue. Ajoute '-- ROADSEN-MIGRATION-REVIEWED: <raison>' apres revue ingenieur-securite (revue GitHub requise via CODEOWNERS)."
                fail=1
              fi
            fi
          done < <(find "$mig_dir" -name "*.sql")
          [ "$fail" -eq 0 ] && echo "OK : aucune migration destructrice non revue" || exit 1

  unit:
    name: Tests unitaires
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Tests unitaires (Vitest) + couverture
        run: pnpm test -- --coverage
      - name: Upload couverture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: '**/coverage/**'
          if-no-files-found: ignore

  integration:
    name: Tests integration (API + DB + isolation)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: roadsen
          POSTGRES_PASSWORD: roadsen_ci
          POSTGRES_DB: roadsen_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U roadsen -d roadsen_ci"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: 'postgresql://roadsen:roadsen_ci@localhost:5432/roadsen_ci?schema=public'
      JWT_SECRET: 'ci-only-secret'
      PV_SIGNING_SECRET: 'ci-only-pv-secret'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Migrations Prisma (deploy)
        run: pnpm --filter @roadsen/api prisma migrate deploy
      - name: Tests integration + isolation multi-tenant
        run: pnpm --filter @roadsen/api test:integration

  # ---------------------------------------------------------------
  # E2E + deploiement preprod : uniquement au merge sur main.
  # ---------------------------------------------------------------
  e2e:
    name: Tests e2e (Playwright)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [quality, unit, integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Installe les navigateurs Playwright
        run: pnpm --filter @roadsen/web exec playwright install --with-deps chromium
      - name: E2E
        run: pnpm test:e2e
      - name: Upload rapport Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: '**/playwright-report/**'
          if-no-files-found: ignore

  deploy-preprod:
    name: Deploiement preprod (Render)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [e2e]
    runs-on: ubuntu-latest
    environment: preprod
    steps:
      - name: Declenche les deploys Render (deploy hooks)
        # Render redeploie le commit main. Secrets a configurer dans le repo :
        #   RENDER_DEPLOY_HOOK_API / RENDER_DEPLOY_HOOK_WEB
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_API }}"
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_WEB }}"
