version: 2
updates:
  # Dependances npm/pnpm du monorepo.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Regroupe les mises a jour mineures/patch pour limiter le bruit.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Actions GitHub.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps)"
