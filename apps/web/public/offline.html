<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GEOFAM — hors connexion</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #f7f6f4;
        color: #1f2329;
        font-family:
          -apple-system,
          system-ui,
          'Segoe UI',
          sans-serif;
      }
      main {
        min-height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 32px;
        gap: 12px;
      }
      h1 {
        font-size: 18px;
        margin: 0;
        color: #22262b;
      }
      p {
        font-size: 14px;
        color: #4a5158;
        max-width: 380px;
        line-height: 1.5;
        margin: 0;
      }
      button {
        margin-top: 12px;
        padding: 8px 16px;
        border-radius: 4px;
        border: none;
        background: #a05226;
        color: #ffffff;
        font-size: 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Connexion indisponible</h1>
      <p>
        GEOFAM nécessite une connexion réseau pour accéder à vos dossiers et
        lancer un calcul. Vérifiez votre connexion puis réessayez.
      </p>
      <button onclick="location.reload()">Réessayer</button>
    </main>
  </body>
</html>
